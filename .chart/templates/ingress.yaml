apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mongoose-ingress
spec:
  rules:
    - host: "{{- .Values.service.host -}}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mongoose
                port:
                  number: 80
